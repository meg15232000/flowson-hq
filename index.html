<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花鼪宇宙總部</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1714;
  --ink2:#4a4540;
  --ink3:#9a9590;
  --bg:#ffffff;
  --bg2:#f7f5f2;
  --bg3:#eeebe6;
  --border:#e5e0d8;
  --gold:#c4973a;
  --gold-light:#fdf6e8;
  --s1-bg:#f0eefa;--s1:#6b4de6;
  --s2-bg:#fff8e8;--s2:#c4830a;
  --s3-bg:#eaf5ea;--s3:#2a8a3a;
  --s4-bg:#e8f5ef;--s4:#0a8a5a;
}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(8px);z-index:100;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:38px;height:38px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.brand-name{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:900;color:var(--ink);}
.brand-sub{font-size:10px;color:var(--ink3);margin-top:1px;letter-spacing:0.1em;}
.header-right{display:flex;align-items:center;gap:12px;}
.add-btn{padding:8px 16px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.add-btn:hover{background:#333;}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-text{font-size:11px;color:var(--ink3);white-space:nowrap;}
.prog-track{width:80px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* BOARD */
.board{flex:1;padding:20px 24px 40px;overflow-y:auto;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start;}
.col{border-radius:10px;padding:12px;border:1px solid var(--border);}
.col-1{background:var(--s1-bg);}
.col-2{background:var(--s2-bg);}
.col-3{background:var(--s3-bg);}
.col-4{background:var(--s4-bg);}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,0.06);}
.col-title{font-size:11px;font-weight:700;letter-spacing:0.1em;}
.col-1 .col-title{color:var(--s1);}
.col-2 .col-title{color:var(--s2);}
.col-3 .col-title{color:var(--s3);}
.col-4 .col-title{color:var(--s4);}
.col-count{font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;background:rgba(0,0,0,0.06);color:var(--ink2);}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:box-shadow 0.12s,transform 0.12s;user-select:none;}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px);}
.card.selected{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,151,58,0.2);}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.card-pid{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--bg2);color:var(--ink2);}
.card-date{font-size:10px;color:var(--ink3);}
.card-title{font-size:12px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:7px;}
.card-type{display:inline-block;font-size:9px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--bg2);color:var(--ink2);}
.empty-col{text-align:center;padding:20px;color:var(--ink3);font-size:11px;border:1px dashed var(--border);border-radius:6px;}
.col.drag-over{outline:2px dashed var(--gold);}
.card.dragging{opacity:0.3;}

/* PANEL */
.panel{width:380px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg);overflow-y:auto;display:flex;flex-direction:column;}
.panel.hidden{display:none;}
.panel-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
.panel-close{float:right;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;font-size:14px;}
.panel-close:hover{background:var(--bg2);}
.panel-pid{font-size:10px;color:var(--ink3);margin-bottom:3px;letter-spacing:0.1em;}
.panel-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.5;margin-bottom:8px;}
.panel-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.panel-date-display{font-size:10px;color:var(--ink3);}
.panel-body{padding:16px 20px 32px;flex:1;}
.section-label{font-size:9px;font-weight:700;letter-spacing:0.14em;color:var(--ink3);text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* 分鏡 */
.frames{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.frame{display:flex;gap:10px;}
.frame-n{font-size:9px;color:var(--ink3);font-weight:500;min-width:32px;padding-top:2px;flex-shrink:0;}
.frame-text{font-size:12px;color:var(--ink);line-height:1.6;}
.frame-scene{font-size:10px;color:var(--ink3);font-style:italic;margin-top:2px;line-height:1.5;}
.no-content{font-size:12px;color:var(--ink3);font-style:italic;padding:12px 0;}

/* 金句 */
.gold-quote{font-family:'Noto Serif TC',serif;font-size:12px;font-weight:700;padding:10px 14px;background:var(--gold-light);color:#7a5a10;border-radius:6px;border-left:3px solid var(--gold);margin-bottom:16px;line-height:1.6;}

/* 文案 */
.caption-box{background:var(--bg2);border-radius:6px;padding:12px 14px;margin-bottom:10px;font-size:11px;color:var(--ink2);line-height:1.8;white-space:pre-line;}
.copy-btn{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.12s;margin-bottom:16px;}
.copy-btn:hover{background:var(--bg2);}
.copy-btn.ok{border-color:var(--s4);color:var(--s4);}

/* 狀態按鈕 */
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;}
.sbtn{padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--ink2);font-size:11px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.12s;text-align:center;}
.sbtn:hover{border-color:var(--ink2);}
.sbtn.active{font-weight:700;}
.sbtn[data-s="待畫"].active{background:var(--s1-bg);border-color:var(--s1);color:var(--s1);}
.sbtn[data-s="畫中"].active{background:var(--s2-bg);border-color:var(--s2);color:var(--s2);}
.sbtn[data-s="完稿"].active{background:var(--s3-bg);border-color:var(--s3);color:var(--s3);}
.sbtn[data-s="已發出"].active{background:var(--s4-bg);border-color:var(--s4);color:var(--s4);}

/* 編輯區 */
.edit-toggle{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-bottom:12px;}
.edit-toggle:hover{background:var(--bg2);}
.edit-area{display:none;margin-top:4px;}
.edit-area.open{display:block;}
.field-label{font-size:10px;font-weight:500;color:var(--ink3);margin-bottom:5px;margin-top:10px;}
.field-input{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;background:var(--bg2);color:var(--ink);outline:none;}
.field-input:focus{border-color:var(--gold);}
textarea.field-input{resize:vertical;}
select.field-input{cursor:pointer;}
.edit-btns{display:flex;gap:6px;margin-top:12px;}
.btn-save{flex:1;padding:9px;border-radius:6px;border:none;background:var(--ink);color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-save:hover{background:#333;}
.btn-del{padding:9px 14px;border-radius:6px;border:1px solid #fca5a5;background:transparent;color:#dc2626;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.btn-del:hover{background:#fef2f2;}
.btn-cancel{padding:9px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--ink2);font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}

/* 新增Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#fff;border-radius:14px;padding:28px 24px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;margin-bottom:20px;color:var(--ink);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}

@media(max-width:900px){.board{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.board{grid-template-columns:1fr;padding:12px 16px;}.panel{width:100%;border-left:none;border-top:1px solid var(--border);}.layout{flex-direction:column;}.header{flex-wrap:wrap;gap:10px;padding:12px 16px;}}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-mark">🌌</div>
    <div>
      <div class="brand-name">花鼪宇宙總部</div>
      <div class="brand-sub">FLOWSON UNIVERSE HQ · 2026</div>
    </div>
  </div>
  <div class="header-right">
    <div class="prog-wrap">
      <span class="prog-text" id="prog-text">0 / 0 已發出</span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <button class="add-btn" onclick="openModal()">＋ 新增貼文</button>
  </div>
</div>

<div class="layout">
  <div class="board" id="board">
    <div class="col col-1" id="col-待畫" ondragover="onDragOver(event)" ondrop="onDrop(event,'待畫')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">✏️ 待畫</span><span class="col-count" id="cnt-待畫">0</span></div>
      <div id="body-待畫"></div>
    </div>
    <div class="col col-2" id="col-畫中" ondragover="onDragOver(event)" ondrop="onDrop(event,'畫中')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">🎨 畫中</span><span class="col-count" id="cnt-畫中">0</span></div>
      <div id="body-畫中"></div>
    </div>
    <div class="col col-3" id="col-完稿" ondragover="onDragOver(event)" ondrop="onDrop(event,'完稿')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">✅ 完稿</span><span class="col-count" id="cnt-完稿">0</span></div>
      <div id="body-完稿"></div>
    </div>
    <div class="col col-4" id="col-已發出" ondragover="onDragOver(event)" ondrop="onDrop(event,'已發出')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">🚀 已發出</span><span class="col-count" id="cnt-已發出">0</span></div>
      <div id="body-已發出"></div>
    </div>
  </div>

  <div class="panel hidden" id="panel">
    <div class="panel-head">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-pid" id="p-pid"></div>
      <div class="panel-title" id="p-title"></div>
      <div class="panel-meta" id="p-meta"></div>
    </div>
    <div class="panel-body">
      <div class="section-label">分鏡腳本</div>
      <div id="p-frames"></div>
      <div id="p-gold"></div>
      <div class="section-label">IG 文案</div>
      <div id="p-caption-wrap"></div>
      <div class="section-label">移動狀態</div>
      <div class="status-btns">
        <button class="sbtn" data-s="待畫" onclick="moveCard('待畫')">✏️ 待畫</button>
        <button class="sbtn" data-s="畫中" onclick="moveCard('畫中')">🎨 畫中</button>
        <button class="sbtn" data-s="完稿" onclick="moveCard('完稿')">✅ 完稿</button>
        <button class="sbtn" data-s="已發出" onclick="moveCard('已發出')">🚀 已發出</button>
      </div>
      <button class="edit-toggle" onclick="toggleEdit()" id="edit-toggle-btn">✏️ 編輯內容</button>
      <div class="edit-area" id="edit-area">
        <div class="field-label">篇號</div>
        <input class="field-input" id="e-pid" placeholder="例：P1">
        <div class="field-label">標題</div>
        <input class="field-input" id="e-title" placeholder="例：【Mopey事件簿】數獨事件">
        <div class="field-label">日期</div>
        <input class="field-input" id="e-date" type="date">
        <div class="field-label">類型</div>
        <select class="field-input" id="e-type">
          <option value="">－ 選擇類型 －</option>
          <option>生活事件</option>
          <option>日常觀察</option>
          <option>角色特寫</option>
          <option>月份桌布</option>
          <option>咖啡廳系列</option>
          <option>互動貼文</option>
          <option>月結特集</option>
          <option>角色介紹</option>
        </select>
        <div class="field-label">金句</div>
        <input class="field-input" id="e-gold" placeholder="例：「花鼪的數獨生涯：第1天。結束。」——Mopey">
        <div class="field-label">IG 文案</div>
        <textarea class="field-input" id="e-caption" rows="6" placeholder="輸入 IG 貼文文案..."></textarea>
        <div class="field-label">分鏡（每行一格，格式：格號｜文字｜畫面）</div>
        <textarea class="field-input" id="e-frames" rows="8" placeholder="封面｜「今天發生了一件事。」｜Mopey趴著&#10;第2張｜「文字內容」｜畫面描述"></textarea>
        <div class="edit-btns">
          <button class="btn-save" onclick="saveEdit()">💾 儲存</button>
          <button class="btn-cancel" onclick="toggleEdit()">取消</button>
          <button class="btn-del" onclick="deleteCard()">🗑 刪除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增貼文 Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-title">＋ 新增貼文</div>
    <div class="field-label">篇號</div>
    <input class="field-input" id="m-pid" placeholder="例：P1、P7">
    <div class="field-label">標題</div>
    <input class="field-input" id="m-title" placeholder="例：【Mopey事件簿】數獨事件">
    <div class="field-label">日期</div>
    <input class="field-input" id="m-date" type="date">
    <div class="field-label">類型</div>
    <select class="field-input" id="m-type">
      <option value="">－ 選擇類型 －</option>
      <option>生活事件</option>
      <option>日常觀察</option>
      <option>角色特寫</option>
      <option>月份桌布</option>
      <option>咖啡廳系列</option>
      <option>互動貼文</option>
      <option>月結特集</option>
      <option>角色介紹</option>
    </select>
    <div class="modal-btns">
      <button class="btn-save" onclick="addPost()">新增</button>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
const STATUSES = ['待畫','畫中','完稿','已發出'];
let selectedId = null;
let dragId = null;

// ── 資料管理 ──
function loadPosts(){
  const raw = localStorage.getItem('hq_posts_v2');
  return raw ? JSON.parse(raw) : [];
}
function savePosts(posts){
  localStorage.setItem('hq_posts_v2', JSON.stringify(posts));
}
function getPost(id){
  return loadPosts().find(p=>p.id===id);
}
function updatePost(id, data){
  const posts = loadPosts();
  const idx = posts.findIndex(p=>p.id===id);
  if(idx>=0) posts[idx] = {...posts[idx], ...data};
  savePosts(posts);
}
function deletePost(id){
  const posts = loadPosts().filter(p=>p.id!==id);
  savePosts(posts);
}
function formatDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  return `${dt.getMonth()+1}/${dt.getDate()}（${days[dt.getDay()]}）`;
}

// ── RENDER ──
function render(){
  const posts = loadPosts();
  STATUSES.forEach(s=>{
    const items = posts.filter(p=>p.status===s).sort((a,b)=>a.date>b.date?1:-1);
    document.getElementById('cnt-'+s).textContent = items.length;
    const body = document.getElementById('body-'+s);
    if(!items.length){
      body.innerHTML = '<div class="empty-col">沒有貼文</div>';
      return;
    }
    body.innerHTML = items.map(p=>cardHTML(p)).join('');
    body.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('dragstart',e=>{
        dragId = card.dataset.id;
        setTimeout(()=>card.classList.add('dragging'),0);
        e.dataTransfer.effectAllowed='move';
      });
      card.addEventListener('dragend',()=>{
        card.classList.remove('dragging');
        dragId = null;
      });
    });
  });
  updateProgress();
  if(selectedId) refreshPanel();
}

function cardHTML(p){
  const sel = selectedId===p.id?' selected':'';
  const dateStr = formatDate(p.date);
  return `<div class="card${sel}" draggable="true" data-id="${p.id}" onclick="openPanel('${p.id}')">
    <div class="card-top">
      <span class="card-pid">${p.pid||'–'}</span>
      <span class="card-date">${dateStr}</span>
    </div>
    <div class="card-title">${p.title||'（未命名）'}</div>
    ${p.type?`<span class="card-type">${p.type}</span>`:''}
  </div>`;
}

function updateProgress(){
  const posts = loadPosts();
  const done = posts.filter(p=>p.status==='已發出').length;
  const total = posts.length;
  document.getElementById('prog-text').textContent = `${done} / ${total} 已發出`;
  document.getElementById('prog-fill').style.width = total ? Math.round(done/total*100)+'%' : '0%';
}

// ── PANEL ──
function openPanel(id){
  selectedId = id;
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('edit-area').classList.remove('open');
  document.getElementById('edit-toggle-btn').textContent = '✏️ 編輯內容';
  refreshPanel();
  render();
}

function refreshPanel(){
  const p = getPost(selectedId);
  if(!p) return;
  const dateStr = formatDate(p.date);
  document.getElementById('p-pid').textContent = (p.pid||'') + (p.pid&&p.date?' · ':' ') + (dateStr||'');
  document.getElementById('p-title').textContent = p.title||'（未命名）';
  document.getElementById('p-meta').innerHTML = p.type?`<span class="card-type">${p.type}</span>`:'';

  // 分鏡
  const framesEl = document.getElementById('p-frames');
  if(p.frames&&p.frames.length){
    framesEl.innerHTML = `<div class="frames">${p.frames.map(f=>`
      <div class="frame">
        <div class="frame-n">${f.n}</div>
        <div>
          <div class="frame-text">${f.text.replace(/\n/g,'<br>')}</div>
          ${f.scene?`<div class="frame-scene">畫面：${f.scene}</div>`:''}
        </div>
      </div>`).join('')}</div>`;
  } else {
    framesEl.innerHTML = '<div class="no-content">尚未填入分鏡</div>';
  }

  // 金句
  const goldEl = document.getElementById('p-gold');
  goldEl.innerHTML = p.gold ? `<div class="gold-quote">${p.gold}</div>` : '';

  // 文案
  const capEl = document.getElementById('p-caption-wrap');
  if(p.caption){
    capEl.innerHTML = `<div class="caption-box">${p.caption.replace(/\n/g,'<br>')}</div>
      <button class="copy-btn" id="copy-btn" onclick="copyCaption()">📋 複製文案</button>`;
  } else {
    capEl.innerHTML = '<div class="no-content">尚未填入文案</div>';
  }

  // 狀態
  document.querySelectorAll('.sbtn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.s===p.status);
  });
}

function closePanel(){
  selectedId = null;
  document.getElementById('panel').classList.add('hidden');
  render();
}

function copyCaption(){
  const p = getPost(selectedId);
  if(!p||!p.caption) return;
  navigator.clipboard.writeText(p.caption).then(()=>{
    const btn = document.getElementById('copy-btn');
    if(!btn) return;
    btn.textContent='✓ 已複製！';
    btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 複製文案';btn.classList.remove('ok');},2000);
  });
}

function moveCard(s){
  if(!selectedId) return;
  updatePost(selectedId,{status:s});
  render();
}

// ── EDIT ──
function toggleEdit(){
  const area = document.getElementById('edit-area');
  const btn = document.getElementById('edit-toggle-btn');
  const isOpen = area.classList.contains('open');
  if(!isOpen){
    const p = getPost(selectedId);
    document.getElementById('e-pid').value = p.pid||'';
    document.getElementById('e-title').value = p.title||'';
    document.getElementById('e-date').value = p.date||'';
    document.getElementById('e-type').value = p.type||'';
    document.getElementById('e-gold').value = p.gold||'';
    document.getElementById('e-caption').value = p.caption||'';
    document.getElementById('e-frames').value = (p.frames||[]).map(f=>
      f.n+'｜'+f.text+(f.scene?'｜'+f.scene:'')
    ).join('\n');
    area.classList.add('open');
    btn.textContent = '▲ 收起';
  } else {
    area.classList.remove('open');
    btn.textContent = '✏️ 編輯內容';
  }
}

function saveEdit(){
  if(!selectedId) return;
  const framesRaw = document.getElementById('e-frames').value.trim();
  const frames = framesRaw ? framesRaw.split('\n').filter(l=>l.trim()).map(l=>{
    const parts = l.split('｜');
    return {n:parts[0]||'', text:parts[1]||'', scene:parts[2]||''};
  }) : [];
  updatePost(selectedId,{
    pid: document.getElementById('e-pid').value.trim(),
    title: document.getElementById('e-title').value.trim(),
    date: document.getElementById('e-date').value,
    type: document.getElementById('e-type').value,
    gold: document.getElementById('e-gold').value.trim(),
    caption: document.getElementById('e-caption').value.trim(),
    frames,
  });
  document.getElementById('edit-area').classList.remove('open');
  document.getElementById('edit-toggle-btn').textContent='✏️ 編輯內容';
  render();
}

function deleteCard(){
  if(!selectedId) return;
  if(!confirm('確定要刪除這篇貼文嗎？')) return;
  deletePost(selectedId);
  selectedId = null;
  document.getElementById('panel').classList.add('hidden');
  render();
}

// ── DRAG ──
function onDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,s){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragId){
    updatePost(dragId,{status:s});
    render();
    if(selectedId===dragId) refreshPanel();
  }
}

// ── MODAL 新增 ──
function openModal(){
  document.getElementById('m-pid').value='';
  document.getElementById('m-title').value='';
  document.getElementById('m-date').value='';
  document.getElementById('m-type').value='';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-pid').focus(),100);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function closeModalBg(e){if(e.target===document.getElementById('modal')) closeModal();}
function addPost(){
  const pid = document.getElementById('m-pid').value.trim();
  const title = document.getElementById('m-title').value.trim();
  const date = document.getElementById('m-date').value;
  const type = document.getElementById('m-type').value;
  if(!title){alert('請填入標題！');return;}
  const posts = loadPosts();
  const id = 'post_'+Date.now();
  posts.push({id, pid, title, date, type, status:'待畫', gold:'', caption:'', frames:[]});
  savePosts(posts);
  closeModal();
  render();
  setTimeout(()=>openPanel(id),100);
}

render();
</script>
</body>

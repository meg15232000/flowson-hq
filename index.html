<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花鼪宇宙總部</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1a1714;
  --ink2:#4a4540;
  --ink3:#9a9590;
  --bg:#ffffff;
  --bg2:#f7f5f2;
  --bg3:#eeebe6;
  --border:#e5e0d8;
  --gold:#c4973a;
  --gold-light:#fdf6e8;
  --s1-bg:#f0eefa;--s1:#6b4de6;
  --s2-bg:#fff8e8;--s2:#c4830a;
  --s3-bg:#eaf5ea;--s3:#2a8a3a;
  --s4-bg:#e8f5ef;--s4:#0a8a5a;
  --tag-生活事件:#fff3e8;--tag-生活事件-c:#b85a10;
  --tag-日常觀察:#f0eefa;--tag-日常觀察-c:#5a3ac4;
  --tag-角色特寫:#e8f5fa;--tag-角色特寫-c:#0a6a8a;
  --tag-月份桌布:#ffe8f0;--tag-月份桌布-c:#b8104a;
  --tag-咖啡廳系列:#eafaf0;--tag-咖啡廳系列-c:#0a8a4a;
  --tag-互動貼文:#f5eafa;--tag-互動貼文-c:#7a0ab8;
  --tag-月結特集:#f0f5ea;--tag-月結特集-c:#4a8a0a;
  --tag-角色介紹:#faeaea;--tag-角色介紹-c:#b80a0a;
}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;
  font-weight:300;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
.header{
  padding:18px 28px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(255,255,255,0.96);
  backdrop-filter:blur(8px);z-index:100;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:40px;height:40px;border-radius:8px;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.brand-name{
  font-family:'Noto Serif TC',serif;
  font-size:17px;font-weight:900;color:var(--ink);
  letter-spacing:0.01em;
}
.brand-sub{font-size:10px;color:var(--ink3);margin-top:1px;letter-spacing:0.12em;}
.header-right{display:flex;align-items:center;gap:20px;}

/* 月份導覽 */
.month-nav{display:flex;gap:4px;flex-wrap:wrap;}
.mnav{
  font-size:11px;font-weight:500;
  padding:5px 12px;border-radius:6px;
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  color:var(--ink3);
  font-family:'Noto Sans TC',sans-serif;
  transition:all 0.12s;
}
.mnav:hover{border-color:var(--ink2);color:var(--ink);}
.mnav.on{background:var(--ink);border-color:var(--ink);color:#fff;}

/* 進度 */
.prog-wrap{display:flex;align-items:center;gap:10px;}
.prog-text{font-size:11px;color:var(--ink3);white-space:nowrap;}
.prog-track{width:80px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width 0.4s ease;}

/* ── FILTERS ── */
.filters{
  padding:10px 28px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  background:var(--bg2);
}
.filter-label{font-size:10px;color:var(--ink3);font-weight:500;letter-spacing:0.08em;margin-right:2px;}
.fbtn{
  font-size:10px;font-weight:500;
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);
  background:var(--bg);color:var(--ink3);
  cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  transition:all 0.12s;
}
.fbtn:hover{border-color:var(--ink2);color:var(--ink);}
.fbtn.on{background:var(--ink);border-color:var(--ink);color:#fff;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── BOARD ── */
.board{
  flex:1;
  padding:20px 28px 40px;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  align-items:start;
}

.col{border-radius:10px;padding:12px;border:1px solid var(--border);}
.col-1{background:var(--s1-bg);}
.col-2{background:var(--s2-bg);}
.col-3{background:var(--s3-bg);}
.col-4{background:var(--s4-bg);}

.col-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.col-title{font-size:11px;font-weight:700;letter-spacing:0.1em;}
.col-1 .col-title{color:var(--s1);}
.col-2 .col-title{color:var(--s2);}
.col-3 .col-title{color:var(--s3);}
.col-4 .col-title{color:var(--s4);}
.col-count{
  font-size:10px;font-weight:700;
  padding:1px 7px;border-radius:8px;
  background:rgba(0,0,0,0.06);color:var(--ink2);
}

/* ── CARD ── */
.card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:11px 12px;
  margin-bottom:7px;
  cursor:pointer;
  transition:box-shadow 0.12s, transform 0.12s;
  user-select:none;
}
.card:hover{
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
  transform:translateY(-1px);
}
.card.selected{
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(196,151,58,0.2);
}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.card-pid{
  font-size:9px;font-weight:700;letter-spacing:0.08em;
  padding:2px 6px;border-radius:4px;
  background:var(--bg2);color:var(--ink2);
}
.card-date{font-size:10px;color:var(--ink3);}
.card-title{
  font-size:12px;font-weight:500;color:var(--ink);
  line-height:1.5;margin-bottom:8px;
}
.card-type{
  display:inline-block;
  font-size:9px;font-weight:500;
  padding:2px 7px;border-radius:4px;
}
.card-drag-handle{
  opacity:0;transition:opacity 0.12s;
  color:var(--ink3);font-size:14px;cursor:grab;
}
.card:hover .card-drag-handle{opacity:1;}

/* type colours */
.t-生活事件{background:var(--tag-生活事件);color:var(--tag-生活事件-c);}
.t-日常觀察{background:var(--tag-日常觀察);color:var(--tag-日常觀察-c);}
.t-角色特寫{background:var(--tag-角色特寫);color:var(--tag-角色特寫-c);}
.t-月份桌布{background:var(--tag-月份桌布);color:var(--tag-月份桌布-c);}
.t-咖啡廳系列{background:var(--tag-咖啡廳系列);color:var(--tag-咖啡廳系列-c);}
.t-互動貼文{background:var(--tag-互動貼文);color:var(--tag-互動貼文-c);}
.t-月結特集{background:var(--tag-月結特集);color:var(--tag-月結特集-c);}
.t-角色介紹{background:var(--tag-角色介紹);color:var(--tag-角色介紹-c);}

.empty-col{
  text-align:center;padding:20px;
  color:var(--ink3);font-size:11px;
  border:1px dashed var(--border);border-radius:6px;
}

/* drag */
.col.drag-over{outline:2px dashed var(--gold);}
.card.dragging{opacity:0.3;}

/* ── DETAIL PANEL ── */
.panel{
  width:360px;flex-shrink:0;
  border-left:1px solid var(--border);
  background:var(--bg);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.panel.hidden{display:none;}

.panel-head{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;
  background:var(--bg);z-index:10;
}
.panel-close{
  float:right;
  width:28px;height:28px;border-radius:6px;
  border:1px solid var(--border);background:transparent;
  color:var(--ink3);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.panel-close:hover{background:var(--bg2);}
.panel-pid{font-size:10px;color:var(--ink3);margin-bottom:4px;letter-spacing:0.1em;}
.panel-title{
  font-family:'Noto Serif TC',serif;
  font-size:15px;font-weight:700;color:var(--ink);
  line-height:1.5;margin-bottom:10px;
}
.panel-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.panel-date{font-size:10px;color:var(--ink3);}

.panel-body{padding:16px 20px 32px;flex:1;}

.section-label{
  font-size:9px;font-weight:700;letter-spacing:0.14em;
  color:var(--ink3);text-transform:uppercase;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* 分鏡 */
.frames{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.frame{display:flex;gap:10px;}
.frame-n{
  font-size:9px;color:var(--ink3);font-weight:500;
  min-width:32px;padding-top:2px;flex-shrink:0;
}
.frame-text{font-size:12px;color:var(--ink);line-height:1.6;}
.frame-scene{font-size:10px;color:var(--ink3);font-style:italic;margin-top:2px;line-height:1.5;}

/* 金句 */
.gold-quote{
  font-family:'Noto Serif TC',serif;
  font-size:12px;font-weight:700;
  padding:10px 14px;
  background:var(--gold-light);
  color:#7a5a10;
  border-radius:6px;
  border-left:3px solid var(--gold);
  margin-bottom:16px;
  line-height:1.6;
}

/* 文案 */
.caption-box{
  background:var(--bg2);border-radius:6px;
  padding:12px 14px;margin-bottom:10px;
  font-size:11px;color:var(--ink2);
  line-height:1.8;white-space:pre-line;
}
.copy-btn{
  width:100%;padding:8px;border-radius:6px;
  border:1px solid var(--border);
  background:transparent;color:var(--ink2);
  font-size:11px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:all 0.12s;margin-bottom:16px;
}
.copy-btn:hover{background:var(--bg2);}
.copy-btn.ok{border-color:var(--s4);color:var(--s4);}

/* 狀態按鈕 */
.status-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.sbtn{
  padding:8px;border-radius:6px;
  border:1px solid var(--border);
  background:var(--bg2);color:var(--ink2);
  font-size:11px;font-weight:500;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:all 0.12s;text-align:center;
}
.sbtn:hover{border-color:var(--ink2);}
.sbtn.active{font-weight:700;}
.sbtn[data-s="待畫"].active{background:var(--s1-bg);border-color:var(--s1);color:var(--s1);}
.sbtn[data-s="畫中"].active{background:var(--s2-bg);border-color:var(--s2);color:var(--s2);}
.sbtn[data-s="完稿"].active{background:var(--s3-bg);border-color:var(--s3);color:var(--s3);}
.sbtn[data-s="已發出"].active{background:var(--s4-bg);border-color:var(--s4);color:var(--s4);}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .board{grid-template-columns:1fr 1fr;}
}
@media(max-width:768px){
  .board{grid-template-columns:1fr;padding:12px 16px;}
  .panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:60vh;}
  .layout{flex-direction:column;}
  .header{flex-wrap:wrap;gap:10px;padding:12px 16px;}
  .filters{padding:8px 16px;}
  .month-nav{display:none;}
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-mark">🌌</div>
    <div>
      <div class="brand-name">花鼪宇宙總部</div>
      <div class="brand-sub">FLOWSON UNIVERSE HQ · 2026</div>
    </div>
  </div>
  <div class="header-right">
    <div class="month-nav" id="month-nav"></div>
    <div class="prog-wrap">
      <span class="prog-text" id="prog-text">0 / 0 已發出</span>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">類型</span>
  <button class="fbtn on" data-f="全部" onclick="setFilter('全部',this)">全部</button>
  <button class="fbtn" data-f="生活事件" onclick="setFilter('生活事件',this)">生活事件</button>
  <button class="fbtn" data-f="日常觀察" onclick="setFilter('日常觀察',this)">日常觀察</button>
  <button class="fbtn" data-f="角色特寫" onclick="setFilter('角色特寫',this)">角色特寫</button>
  <button class="fbtn" data-f="月份桌布" onclick="setFilter('月份桌布',this)">月份桌布</button>
  <button class="fbtn" data-f="咖啡廳系列" onclick="setFilter('咖啡廳系列',this)">咖啡廳系列</button>
  <button class="fbtn" data-f="互動貼文" onclick="setFilter('互動貼文',this)">互動貼文</button>
  <button class="fbtn" data-f="月結特集" onclick="setFilter('月結特集',this)">月結特集</button>
</div>

<div class="layout">
  <div class="board" id="board">
    <div class="col col-1" id="col-待畫" ondragover="onDragOver(event)" ondrop="onDrop(event,'待畫')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">✏️ 待畫</span><span class="col-count" id="cnt-待畫">0</span></div>
      <div id="body-待畫"></div>
    </div>
    <div class="col col-2" id="col-畫中" ondragover="onDragOver(event)" ondrop="onDrop(event,'畫中')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">🎨 畫中</span><span class="col-count" id="cnt-畫中">0</span></div>
      <div id="body-畫中"></div>
    </div>
    <div class="col col-3" id="col-完稿" ondragover="onDragOver(event)" ondrop="onDrop(event,'完稿')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">✅ 完稿</span><span class="col-count" id="cnt-完稿">0</span></div>
      <div id="body-完稿"></div>
    </div>
    <div class="col col-4" id="col-已發出" ondragover="onDragOver(event)" ondrop="onDrop(event,'已發出')" ondragleave="onDragLeave(event)">
      <div class="col-head"><span class="col-title">🚀 已發出</span><span class="col-count" id="cnt-已發出">0</span></div>
      <div id="body-已發出"></div>
    </div>
  </div>

  <div class="panel hidden" id="panel">
    <div class="panel-head">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <div class="panel-pid" id="p-pid"></div>
      <div class="panel-title" id="p-title"></div>
      <div class="panel-meta" id="p-meta"></div>
    </div>
    <div class="panel-body">
      <div class="section-label">分鏡腳本</div>
      <div class="frames" id="p-frames"></div>
      <div class="gold-quote" id="p-gold"></div>
      <div class="section-label">IG 文案</div>
      <div class="caption-box" id="p-caption"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyCaption()">📋 複製文案</button>
      <div class="section-label">移動狀態</div>
      <div class="status-btns">
        <button class="sbtn" data-s="待畫" onclick="moveCard('待畫')">✏️ 待畫</button>
        <button class="sbtn" data-s="畫中" onclick="moveCard('畫中')">🎨 畫中</button>
        <button class="sbtn" data-s="完稿" onclick="moveCard('完稿')">✅ 完稿</button>
        <button class="sbtn" data-s="已發出" onclick="moveCard('已發出')">🚀 已發出</button>
      </div>
      <div style="margin-top:16px;">
        <button class="copy-btn" onclick="toggleEdit()" id="edit-btn">✏️ 編輯內容</button>
      </div>
      <div id="edit-area" style="display:none;margin-top:12px;">
        <div class="section-label">編輯篇號</div>
        <input id="edit-pid" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;margin-bottom:12px;background:var(--bg2);color:var(--ink);">
        <div class="section-label">編輯標題</div>
        <textarea id="edit-title" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:48px;margin-bottom:12px;background:var(--bg2);color:var(--ink);"></textarea>
        <div class="section-label">編輯日期</div>
        <input id="edit-date" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;margin-bottom:12px;background:var(--bg2);color:var(--ink);">
        <div class="section-label">編輯類型</div>
        <select id="edit-type" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;margin-bottom:12px;background:var(--bg2);color:var(--ink);">
          <option>生活事件</option>
          <option>日常觀察</option>
          <option>角色特寫</option>
          <option>月份桌布</option>
          <option>咖啡廳系列</option>
          <option>互動貼文</option>
          <option>月結特集</option>
          <option>角色介紹</option>
        </select>
        <div class="section-label">編輯金句</div>
        <textarea id="edit-gold" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:48px;margin-bottom:12px;background:var(--bg2);color:var(--ink);"></textarea>
        <div class="section-label">編輯 IG 文案</div>
        <textarea id="edit-caption" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:120px;margin-bottom:12px;background:var(--bg2);color:var(--ink);"></textarea>
        <div class="section-label">編輯分鏡（每行一格，格式：格號｜文字｜畫面）</div>
        <textarea id="edit-frames" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'Noto Sans TC',sans-serif;resize:vertical;min-height:140px;margin-bottom:12px;background:var(--bg2);color:var(--ink);"></textarea>
        <div style="display:flex;gap:6px;">
          <button class="copy-btn" style="flex:1;" onclick="saveEdit()">💾 儲存</button>
          <button class="copy-btn" style="flex:1;" onclick="cancelEdit()">✕ 取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const STATUSES = ['待畫','畫中','完稿','已發出'];
const MONTHS = ['四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
let currentMonth = 0;
let currentFilter = '全部';
let selectedId = null;
let dragId = null;

// ── 所有貼文 ──
const posts = [
  // 四月
  {id:'p1',pid:'P1',month:'四月',date:'4/13（一）',type:'角色介紹',
    title:'【花鼪宇宙】宇宙起源篇',
    frames:[
      {n:'封面',text:'「這是我的秘密日記。」',scene:'Mopey趴在日記本上，左右張望'},
      {n:'第2張',text:'「我住在這裡。和兩個特別的生物一起。」',scene:'家的全景，三個角色各做各的事'},
      {n:'第3張',text:'「第一個叫花鼪。凌晨兩點會把我搖醒說她有好主意。我每次假裝沒聽到。每次都失敗。」',scene:'深夜，花鼪眼睛發亮盯著Mopey'},
      {n:'第4張',text:'「第二個叫福爾摩叔。看起來只是在配合她。但每次事情能成，都是因為他。」',scene:'花鼪指揮、福爾摩叔慢條斯理把事情做好'},

  {month:'八月',pid:'P401',date:'8/3（一）',type:'月份桌布',title:'八月桌布 🍮 泡芙'},

const allPosts = [...posts, ...laterMonths];

// ── 狀態管理 ──
function getStatus(id){ return localStorage.getItem('hq_'+id) || defaultStatus(id); }
function setStatus(id, s){ localStorage.setItem('hq_'+id, s); }
function defaultStatus(id){
  if(['p1','p2','p3'].includes(id)) return '已發出';
  if(id==='p5') return '完稿';
  return '待畫';
}

// ── 月份 Tabs ──
function buildMonthNav(){
  const nav = document.getElementById('month-nav');
  MONTHS.forEach((m,i)=>{
    const btn = document.createElement('button');
    btn.className = 'mnav'+(i===0?' on':'');
    btn.textContent = m;
    btn.onclick = ()=>{
      currentMonth = i;
      document.querySelectorAll('.mnav').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      closePanel();
      render();
    };
    nav.appendChild(btn);
  });
}

function getVisiblePosts(){
  const m = MONTHS[currentMonth];
  return allPosts.filter(p=>{
    const monthOk = p.month === m;
    const typeOk = currentFilter==='全部' || p.type===currentFilter;
    return monthOk && typeOk;
  });
}

// ── RENDER ──
function render(){
  const visible = getVisiblePosts();
  STATUSES.forEach(s=>{
    const items = visible.filter(p=>getStatus(p.id)===s);
    document.getElementById('cnt-'+s).textContent = items.length;
    const body = document.getElementById('body-'+s);
    if(!items.length){
      body.innerHTML = '<div class="empty-col">暫無貼文</div>';
      return;
    }
    body.innerHTML = items.map(p=>cardHTML(p)).join('');
    body.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('dragstart', e=>{
        dragId = card.dataset.id;
        setTimeout(()=>card.classList.add('dragging'),0);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', ()=>{
        card.classList.remove('dragging');
        dragId = null;
      });
    });
  });
  updateProgress();
  if(selectedId) refreshPanel();
}

function cardHTML(p){
  const sel = selectedId===p.id ? ' selected':'';
  return `<div class="card${sel}" draggable="true" data-id="${p.id}" onclick="openPanel('${p.id}')">
    <div class="card-top">
      <span class="card-pid">${p.pid}</span>
      <span class="card-date">${p.date}</span>
    </div>
    <div class="card-title">${p.title}</div>
    <span class="card-type t-${p.type}">${p.type}</span>
  </div>`;
}

function updateProgress(){
  const m = MONTHS[currentMonth];
  const all = allPosts.filter(p=>p.month===m);
  const done = all.filter(p=>getStatus(p.id)==='已發出');
  document.getElementById('prog-text').textContent = `${done.length} / ${all.length} 已發出`;
  document.getElementById('prog-fill').style.width = all.length ? Math.round(done.length/all.length*100)+'%' : '0%';
}

// ── PANEL ──
function openPanel(id){
  selectedId = id;
  document.getElementById('panel').classList.remove('hidden');
  refreshPanel();
  render();
}

function refreshPanel(){
  const p = getPostData(selectedId);
  if(!p) return;
  document.getElementById('p-pid').textContent = p.pid + ' · ' + p.month;
  document.getElementById('p-title').textContent = p.title;
  document.getElementById('p-meta').innerHTML =
    `<span class="card-type t-${p.type}">${p.type}</span><span class="panel-date">📅 ${p.date}</span>`;
  document.getElementById('p-frames').innerHTML = p.frames.map(f=>`
    <div class="frame">
      <div class="frame-n">${f.n}</div>
      <div>
        <div class="frame-text">${f.text.replace(/\n/g,'<br>')}</div>
        ${f.scene?`<div class="frame-scene">畫面：${f.scene}</div>`:''}
      </div>
    </div>`).join('');
  document.getElementById('p-gold').textContent = p.gold;
  document.getElementById('p-caption').innerHTML = p.caption.replace(/\n/g,'<br>');
  const s = getStatus(selectedId);
  document.querySelectorAll('.sbtn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.s===s);
  });
}

function closePanel(){
  selectedId = null;
  document.getElementById('panel').classList.add('hidden');
  render();
}

function copyCaption(){
  const p = getPostData(selectedId);
  if(!p) return;
  navigator.clipboard.writeText(p.caption).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已複製！';
    btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='📋 複製文案';btn.classList.remove('ok');},2000);
  });
}

function moveCard(s){
  if(!selectedId) return;
  setStatus(selectedId, s);
  render();
  refreshPanel();
}

// ── DRAG ──
function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, s){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragId){ setStatus(dragId, s); render(); if(selectedId===dragId) refreshPanel(); }
}

// ── FILTER ──
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// ── 編輯功能 ──
function getCustomData(id){
  const raw = localStorage.getItem('hq_edit_'+id);
  return raw ? JSON.parse(raw) : null;
}
function saveCustomData(id, data){
  localStorage.setItem('hq_edit_'+id, JSON.stringify(data));
}

function getPostData(id){
  const base = allPosts.find(x=>x.id===id);
  const custom = getCustomData(id);
  if(!custom) return base;
  return {...base, ...custom};
}

function toggleEdit(){
  const area = document.getElementById('edit-area');
  const btn = document.getElementById('edit-btn');
  if(area.style.display==='none'){
    const p = getPostData(selectedId);
    document.getElementById('edit-pid').value = p.pid;
    document.getElementById('edit-title').value = p.title;
    document.getElementById('edit-date').value = p.date;
    document.getElementById('edit-type').value = p.type;
    document.getElementById('edit-gold').value = p.gold;
    document.getElementById('edit-caption').value = p.caption;
    document.getElementById('edit-frames').value = p.frames.map(f=>
      f.n+'｜'+f.text+(f.scene?'｜'+f.scene:'')
    ).join('\n');
    area.style.display='block';
    btn.textContent='▲ 收起';
  } else {
    area.style.display='none';
    btn.textContent='✏️ 編輯內容';
  }
}

function saveEdit(){
  if(!selectedId) return;
  const pid = document.getElementById('edit-pid').value.trim();
  const title = document.getElementById('edit-title').value.trim();
  const date = document.getElementById('edit-date').value.trim();
  const type = document.getElementById('edit-type').value;
  const gold = document.getElementById('edit-gold').value.trim();
  const caption = document.getElementById('edit-caption').value.trim();
  const framesRaw = document.getElementById('edit-frames').value.trim();
  const frames = framesRaw.split('\n').filter(l=>l.trim()).map(l=>{
    const parts = l.split('｜');
    return {n:parts[0]||'', text:parts[1]||'', scene:parts[2]||''};
  });
  saveCustomData(selectedId, {pid, title, date, type, gold, caption, frames});
  document.getElementById('edit-area').style.display='none';
  document.getElementById('edit-btn').textContent='✏️ 編輯內容';
  refreshPanel();
  render();
}

function cancelEdit(){
  document.getElementById('edit-area').style.display='none';
  document.getElementById('edit-btn').textContent='✏️ 編輯內容';
}

buildMonthNav();
render();
</script>
